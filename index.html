<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Portfolio</title>
    <link rel="stylesheet" href="main.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Courier+Prime&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">Maya</div>

        <nav>

            <a href="#">OUR WORKS</a>
            <a href="#">SERVICES</a>
            <a href="#">CONTACT ME</a>
            <a href="#">ABOUT</a>
        </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-left">
            <h1>

                Creative design and premium printing solutions.

        </div>
    </section>

    <!-- Banner -->
    <section class="banner"></section>

    <section class="services">
        <h2>WHAT CAN I DO FOR YOU?</h2>

        <div class="service-item">

                <i class="fa-regular fa-shirt"></i>

            </div>
        </div>
    </section>

    <section class="portfolio">
        <div class="portfolio-header">
            <h2>MY DESIGNS</h2>

            <div class="filters">
                <a href="#">ALL</a>
                <a href="#">T-SHIRT</a>

            </div>
        </div>

        <div class="gallery">
